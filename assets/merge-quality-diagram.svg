  <text x="671" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#38bdf8" text-anchor="middle" font-weight="700">Column-wise</text>
  <text x="671" y="354" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6" text-anchor="middle">Structural sign</text>
