  <!-- ====== BOTTOM SUMMARY ====== -->
  <rect x="30" y="428" width="840" height="76" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="448" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
    <tspan fill="#94a3b8" font-weight="600">standard:</tspan> current behavior — fast, no overhead
    <tspan dx="20" fill="#38bdf8" font-weight="600">enhanced:</tspan> +TALL-masks +column-wise — minimal extra compute
    <tspan dx="20" fill="#f59e0b" font-weight="600">maximum:</tspan> +KnOTS SVD — best quality
  </text>
  <text x="450" y="468" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
    <tspan fill="#64ffda" font-weight="600">Best combination:</tspan> maximum + della_conflict (or dare_conflict) for full pipeline
  </text>
  <text x="450" y="488" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
    <tspan fill="#64748b">Works with all merge modes (TIES, weighted_average, SLERP, etc.) and all architectures</tspan>
  </text>
  <text x="450" y="498" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Single-LoRA prefixes: all enhancements short-circuit (zero overhead)</text>
