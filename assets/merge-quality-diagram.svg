  <text x="401" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="600">Sign Vote + Merge</text>
  <line x1="332" y1="108" x2="470" y2="108" stroke="#334155" stroke-width="0.5"/>
