  <text x="377" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#38bdf8" text-anchor="middle" font-weight="700">TALL-masks</text>
  <text x="377" y="224" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6" text-anchor="middle">Separate selfish</text>
  <text x="377" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6" text-anchor="middle">weights (unique to</text>
  <text x="377" y="252" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#ccd6f6" text-anchor="middle">one LoRA) from</text>
  <text x="377" y="266" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#38bdf8" text-anchor="middle">consensus merge</text>

